<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CardShield – Smart Card Validator</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Background mesh -->
  <div class="bg-mesh"></div>

  <div class="page-wrapper">

    <!-- Header -->
    <header class="site-header">
      <div class="header-badge">
        <span class="shield-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L3 7V12C3 16.55 6.84 20.74 12 22C17.16 20.74 21 16.55 21 12V7L12 2Z" fill="currentColor" fill-opacity="0.2" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M9 12L11 14L15 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="badge-text">Secure</span>
      </div>
      <h1 class="site-title">CardShield</h1>
      <p class="site-subtitle">Smart Card Validator</p>
    </header>

    <!-- Main layout -->
    <main class="main-layout">

      <!-- Card Preview -->
      <div class="card-preview-wrap">
        <div class="card-preview" id="cardPreview">
          <div class="card-chip">
            <svg width="36" height="28" viewBox="0 0 36 28" fill="none">
              <rect x="0.5" y="0.5" width="35" height="27" rx="4.5" fill="#c8a84b" fill-opacity="0.25" stroke="#c8a84b" stroke-opacity="0.6"/>
              <line x1="12" y1="0.5" x2="12" y2="27.5" stroke="#c8a84b" stroke-opacity="0.5"/>
              <line x1="24" y1="0.5" x2="24" y2="27.5" stroke="#c8a84b" stroke-opacity="0.5"/>
              <line x1="0.5" y1="9" x2="35.5" y2="9" stroke="#c8a84b" stroke-opacity="0.5"/>
              <line x1="0.5" y1="19" x2="35.5" y2="19" stroke="#c8a84b" stroke-opacity="0.5"/>
            </svg>
          </div>

          <div class="card-network" id="cardNetwork">
            <span class="network-label" id="networkLabel">——</span>
          </div>

          <div class="card-number-preview" id="cardNumberPreview">
            •••• &nbsp; •••• &nbsp; •••• &nbsp; ••••
          </div>

          <div class="card-meta">
            <div class="card-meta-item">
              <span class="meta-label">Expires</span>
              <span class="meta-value" id="expiryPreview">MM / YY</span>
            </div>
          </div>

          <div class="card-glow"></div>
        </div>
      </div>

      <!-- Validator Form -->
      <div class="validator-panel">
        <div class="panel-header">
          <h2>Validate Your Card</h2>
          <p>Enter card details to check validity</p>
        </div>

        <div class="form-body">

          <!-- Card Number -->
          <div class="field-group">
            <label for="cardNumber">Card Number</label>
            <div class="input-wrap">
              <input
                type="text"
                id="cardNumber"
                class="field-input"
                placeholder="0000  0000  0000  0000"
                inputmode="numeric"
                autocomplete="off"
                maxlength="19"
              />
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="1" y="5" width="22" height="14" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M1 10H23" stroke="currentColor" stroke-width="1.5"/></svg>
              </span>
            </div>
            <span class="card-type-badge" id="cardTypeBadge"></span>
          </div>

          <!-- Expiry Row -->
          <div class="field-row">
            <div class="field-group">
              <label>Expiry Month</label>
              <div class="input-wrap">
                <input
                  type="text"
                  id="expMonth"
                  class="field-input"
                  placeholder="MM"
                  inputmode="numeric"
                  maxlength="2"
                  autocomplete="off"
                />
              </div>
            </div>
            <div class="field-divider">/</div>
            <div class="field-group">
              <label>Expiry Year</label>
              <div class="input-wrap">
                <input
                  type="text"
                  id="expYear"
                  class="field-input"
                  placeholder="YY"
                  inputmode="numeric"
                  maxlength="2"
                  autocomplete="off"
                />
              </div>
            </div>
          </div>

          <!-- Validate Button -->
          <button class="validate-btn" id="validateBtn" onclick="validateCard()">
            <span class="btn-text">Validate Card</span>
            <span class="btn-arrow">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12H19M13 6L19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
          </button>

        </div>

        <div class="panel-footer">
          <a href="documentation.html" class="docs-link">Documentation</a>
          <span class="footer-divider">·</span>
          <span class="footer-note">Client-side validation only</span>
        </div>
      </div>

    </main>

  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-box" id="modalBox">
      <button class="modal-close" onclick="closeModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div class="modal-icon" id="modalIcon"></div>
      <h3 class="modal-title" id="modalTitle"></h3>
      <p class="modal-message" id="modalMessage"></p>
      <button class="modal-btn" onclick="closeModal()">Got it</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
